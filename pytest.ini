[pytest]
# TASK-163: scope pytest to tests/ — this excludes the root-level script-style
# tests (test_formulas.py / test_utils.py, which run as `python3 <file>`, not via
# pytest) and the gitignored project_sync_20260418/ snapshot that would otherwise
# pollute collection with duplicate module basenames.
testpaths = tests

markers =
    integration: hits live external services (Google Sheets) — needs creds; auto-marked by path in tests/conftest.py and skipped in CI via -m "not integration"
