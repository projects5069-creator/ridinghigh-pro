# TASK-48 monthly — STANDALONE monthly Critic email.
# Separate workflow. Runs 1st of month 01:00 Peru ('0 6 1 * *'), summarizes the PREVIOUS month.
# TASK-48 EMAIL.2 — STANDALONE monthly Critic email.
# '0 6 1 * *' = 06:00 UTC = 01:00 Peru, 1st of month (summarizes previous month)
name: Agent Critic Monthly

on:
  schedule:
    # '0 6 1 * *' = 06:00 UTC = 01:00 Peru, 1st of month (summarizes previous month)
    # near midnight UTC (global peak) — the :07 offset was not enough.
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  run-critic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Critic orchestrator
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: 'true'
          DATA_PROVIDER: alpaca
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m agent.orchestrator_critic_monthly
