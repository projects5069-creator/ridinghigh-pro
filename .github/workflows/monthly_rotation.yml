name: Monthly Rotation

on:
  schedule:
    - cron: '1 5 1 * *'   # 05:01 UTC (00:01 Peru), runs BEFORE prepare_next_month at 05:05
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write  # needed to push sheets_config.json back to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-auth-oauthlib google-api-python-client pandas pytz

      - name: Run monthly rotation
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          python monthly_rotation.py
