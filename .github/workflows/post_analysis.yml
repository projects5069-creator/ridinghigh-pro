name: Post Analysis Collector

on:
  schedule:
    - cron: '5 21 * * 1-5'   # 16:05 Peru (UTC-5), Mon-Fri — offset from hour boundary to avoid GH Actions cron drift
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install finvizfinance gspread google-auth google-api-python-client pandas yfinance pytz pandas_market_calendars ta alpaca-py

      - name: EOD Snapshot (portfolio + daily_summary)
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATA_PROVIDER: alpaca
          ALPACA_PAPER: "true"
        run: |
          python auto_scanner.py --eod

      - name: Run Post Analysis Collector
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATA_PROVIDER: alpaca
          ALPACA_PAPER: "true"
        run: |
          python post_analysis_collector.py

      - name: Enrich with Intraday Data
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATA_PROVIDER: alpaca
          ALPACA_PAPER: "true"
        run: |
          python enrich_post_analysis.py

      - name: Backfill missing OHLC
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATA_PROVIDER: alpaca
          ALPACA_PAPER: "true"
        run: |
          # TASK-124: v2 cross-month (current + previous) heals end-of-month
          # rows that v1 (active-month, D1-only trigger) left PENDING forever.
          # v1 stays in the repo (§12); only this step stops calling it.
          python backfill_ohlc_v2.py --recent 2 --apply
