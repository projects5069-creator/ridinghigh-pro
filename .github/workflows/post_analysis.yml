name: Post Analysis Collector

on:
  schedule:
    - cron: '0 21 * * 1-5'   # 16:00 Peru (UTC-5), Mon-Fri
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install finvizfinance gspread google-auth google-api-python-client pandas yfinance pytz pandas_market_calendars ta

      - name: EOD Snapshot (portfolio + daily_summary)
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python auto_scanner.py --eod

      - name: Run Post Analysis Collector
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python post_analysis_collector.py

      - name: Enrich with Intraday Data
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python enrich_post_analysis.py

      - name: Backfill missing OHLC
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python backfill_ohlc.py
