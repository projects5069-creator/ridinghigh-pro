name: Agent — Market Context (Hourly)

on:
  schedule:
    # 8 runs/day (open + 7 hourly), Mon–Fri, during US market window.
    # Market open (13:30 UTC) — most volatile hour, must not be skipped
    - cron: '30 13 * * 1-5'
    # Top of every hour through close (14:00–20:00 UTC)
    - cron: '0 14-20 * * 1-5'
  workflow_dispatch:

jobs:
  market-context:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Market Context Agent
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: 'true'
          DATA_PROVIDER: alpaca
        run: python -m agent.market_context.run_market_context
