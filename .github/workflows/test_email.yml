name: TEST Email Alert
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytz gspread google-auth
      - name: Test email with full report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          python3 <<'PYEOF'
          import sys
          sys.path.insert(0, '.')
          from health_audit import CheckResult, CRITICAL, WARNING, PASSED, INFO, send_email_alert

          # סימולציה של דוח אמיתי עם ערבוב סטטוסים
          fake_results = [
              CheckResult("C1", "Code integrity", "Code", PASSED, "All imports clean"),
              CheckResult("C2", "Hardcoded thresholds", "Code", WARNING, "6 hardcoded threshold(s)", "MIN_SCORE in 3 files; TP_THRESHOLD in 2 files"),
              CheckResult("D1", "Timeline freshness", "Data", PASSED, "Last update: 2026-04-28"),
              CheckResult("D2", "Post-analysis completeness", "Data", PASSED, "All 3 days present"),
              CheckResult("D3", "GitHub Actions health", "Data", CRITICAL, "Only 23% success rate", "Last 30 runs: 7 success, 23 failure (since 11:30 Peru)"),
              CheckResult("Q1", "Score range", "Quality", PASSED, "All 138 Scores in [0,100]"),
              CheckResult("Q4", "Outliers", "Quality", PASSED, "No outliers detected"),
              CheckResult("16", "Metric Sanity", "Quality", PASSED, "All metrics show healthy variance"),
              CheckResult("R1", "Uncommitted files", "Repo", INFO, "3 uncommitted file(s)"),
          ]
          ok = send_email_alert(fake_results)
          if not ok:
              sys.exit(1)
          print("✅ Full-report email sent successfully")
          PYEOF
