name: Warm OAuth Token

# Keeps the OAuth refresh token alive by triggering a refresh every 3 days.
# Without this, Google would revoke the token after 7 days of inactivity
# (apps in 'Testing' OAuth consent status).
#
# If refresh fails → email alert with manual renewal instructions.

on:
  schedule:
    - cron: '0 12 */3 * *'  # Every 3 days at 12:00 UTC (07:00 Peru)
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Warm OAuth token
        env:
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: python3 warm_oauth_token.py
