name: Health Audit

# Runs 3 times a day, every day (including weekends — system might fail outside trading hours)
# Times are in Peru (UTC-5, no DST):
#   06:00 Peru = 11:00 UTC — pre-market check
#   12:00 Peru = 17:00 UTC — mid-day check
#   22:00 Peru = 03:00 UTC (next day) — end-of-day check
on:
  schedule:
    - cron: '0 11 * * *'  # 06:00 Peru
    - cron: '0 17 * * *'  # 12:00 Peru
    - cron: '0 3 * * *'   # 22:00 Peru
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth pytz

      - name: Run health audit
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          DATA_PROVIDER: alpaca
          ALPACA_PAPER: "true"
        run: |
          python3 health_audit.py
        continue-on-error: true  # Failures should not abort — report is the goal

      - name: Show summary
        run: |
          echo "Health audit complete. Check the 'RidingHigh-Health-Audit' Google Sheet for details."
