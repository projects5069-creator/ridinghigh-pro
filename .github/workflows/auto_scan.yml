name: RidingHigh Auto Scanner

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install finvizfinance yfinance pandas gspread google-auth google-api-python-client ta pytz pandas_market_calendars

      - name: Run scanner
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python auto_scanner.py
