name: RidingHigh Auto Scanner

on:
  schedule:
    # Every minute Mon-Fri 13:30-20:00 UTC (= 08:30-15:00 Peru)
    - cron: '* 13-19 * * 1-5'
    - cron: '* 20 * * 1-5'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install finvizfinance yfinance pandas gspread google-auth ta pytz

      - name: Run scanner
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python auto_scanner.py
