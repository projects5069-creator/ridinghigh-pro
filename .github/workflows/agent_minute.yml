name: Agent — Every Minute (DRY_RUN)

on:
  schedule:
    - cron: '*/1 13-21 * * 1-5'  # 13-21 UTC covers EDT+EST market close; is_market_hours gates actual runs
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run agent orchestrator
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          # Dedicated agent_minute SA (mirror TASK-215/_AS) — _get_gc prefers this;
          # no-op until the GOOGLE_CREDENTIALS_JSON_AM secret is provisioned.
          GOOGLE_CREDENTIALS_JSON_AM: ${{ secrets.GOOGLE_CREDENTIALS_JSON_AM }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ALPACA_PAPER: 'true'
          DATA_PROVIDER: alpaca
        run: python -m agent.orchestrator
