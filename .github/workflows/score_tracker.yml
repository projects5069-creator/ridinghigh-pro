name: Score Tracker Sync

on:
  schedule:
    - cron: '10 20 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread google-auth pandas pytz
      - name: Write credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json
      - name: Run Score Tracker
        run: python score_tracker_sync.py
