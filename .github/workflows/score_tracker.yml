name: Score Tracker Sync

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install gspread google-auth pandas yfinance ta requests beautifulsoup4 pytz
      - name: Write credentials
        run: echo '${ { secrets.GOOGLE_CREDENTIALS_JSON } }' > google_credentials.json
      - name: Run Score Tracker
        run: python score_tracker_sync.py
